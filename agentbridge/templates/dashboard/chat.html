<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>agentbridge chat tester</title>
    <style>
        :root {
            --bg: #f7f8f8;
            --surface: #ffffff;
            --surface-muted: #f1f3f3;
            --text: #1f2424;
            --muted: #667070;
            --border: #dfe4e4;
            --accent: #168575;
            --accent-strong: #0f6f62;
            --danger: #b42318;
            --danger-bg: #fff1f0;
            --danger-border: #f5c6c1;
            --warn: #a15c07;
            --ok: #1b806a;
            --shadow: 0 18px 50px rgba(18, 27, 27, 0.08);
            --font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            --mono: "SF Mono", "Cascadia Code", Menlo, Consolas, monospace;
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            min-height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            font-size: 14px;
        }

        body {
            height: 100vh;
            overflow: hidden;
        }

        button, input, select, textarea {
            font: inherit;
        }

        button {
            border: 0;
            cursor: pointer;
        }

        .app {
            height: 100vh;
            display: grid;
            grid-template-rows: auto 1fr;
        }

        .topbar {
            min-height: 56px;
            border-bottom: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.92);
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 18px;
        }

        .brand {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-width: 142px;
            color: var(--text);
            font-weight: 700;
            letter-spacing: 0;
            text-decoration: none;
        }

        .brand-mark {
            width: 22px;
            height: 16px;
        }

        .field {
            height: 36px;
            border: 1px solid var(--border);
            border-radius: 7px;
            background: var(--surface);
            color: var(--text);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 0 10px;
        }

        .field span {
            color: var(--muted);
            font-size: 12px;
            white-space: nowrap;
        }

        .field input,
        .field select {
            height: 30px;
            min-width: 0;
            border: 0;
            outline: 0;
            color: var(--text);
            background: transparent;
        }

        .field-url {
            flex: 1;
            max-width: 460px;
        }

        .field-url input {
            width: 100%;
            font-family: var(--mono);
            font-size: 12px;
        }

        .field-model {
            width: 310px;
        }

        .field-model select {
            width: 100%;
            font-size: 12px;
        }

        .status {
            margin-left: auto;
            min-width: 82px;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 7px 10px;
            color: var(--muted);
            background: var(--surface);
            font-size: 12px;
            white-space: nowrap;
        }

        .status::before {
            content: "";
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--muted);
        }

        .status.ok {
            color: var(--ok);
            border-color: rgba(27, 128, 106, 0.28);
            background: rgba(27, 128, 106, 0.06);
        }

        .status.ok::before { background: var(--ok); }

        .status.error {
            color: var(--danger);
            border-color: var(--danger-border);
            background: var(--danger-bg);
        }

        .status.error::before { background: var(--danger); }

        .main {
            min-height: 0;
            display: grid;
            grid-template-rows: 1fr auto;
            width: min(980px, 100%);
            margin: 0 auto;
            padding: 22px 18px;
            gap: 16px;
        }

        .messages {
            min-height: 0;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-right: 4px;
        }

        .empty {
            margin: auto;
            color: var(--muted);
            text-align: center;
            line-height: 1.5;
        }

        .empty strong {
            display: block;
            margin-bottom: 4px;
            color: var(--text);
            font-size: 16px;
        }

        .message {
            max-width: 760px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--surface);
            padding: 12px 14px;
            box-shadow: 0 1px 0 rgba(18, 27, 27, 0.03);
        }

        .message.user {
            align-self: flex-end;
            background: #eef8f6;
            border-color: rgba(22, 133, 117, 0.22);
        }

        .message.assistant {
            align-self: flex-start;
        }

        .message.error {
            align-self: stretch;
            max-width: none;
            border-color: var(--danger-border);
            background: var(--danger-bg);
        }

        .message-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 7px;
            color: var(--muted);
            font-size: 12px;
        }

        .message-body {
            white-space: pre-wrap;
            line-height: 1.5;
        }

        .message-files {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 10px;
        }

        .file-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            max-width: 240px;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 4px 7px;
            background: var(--surface);
            color: var(--muted);
            font-size: 12px;
        }

        .file-pill span {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .error-title {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--danger);
            font-weight: 700;
        }

        .error-summary {
            margin: 2px 0 10px;
            color: var(--text);
        }

        .error-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .error-details {
            margin-top: 10px;
            border-top: 1px solid var(--danger-border);
            padding-top: 10px;
        }

        .error-details summary {
            width: fit-content;
            cursor: pointer;
            color: var(--danger);
            font-size: 12px;
        }

        pre {
            margin: 10px 0 0;
            max-height: 240px;
            overflow: auto;
            border: 1px solid var(--border);
            border-radius: 7px;
            background: #fbfbfb;
            padding: 10px;
            color: #263030;
            font-family: var(--mono);
            font-size: 12px;
            line-height: 1.45;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .composer {
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--surface);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .drop-hint {
            display: none;
            margin: 10px 10px 0;
            border: 1px dashed rgba(22, 133, 117, 0.5);
            border-radius: 7px;
            padding: 10px;
            color: var(--accent-strong);
            background: rgba(22, 133, 117, 0.06);
            text-align: center;
            font-size: 13px;
        }

        .composer.dragging .drop-hint {
            display: block;
        }

        .attached-files {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            padding: 10px 10px 0;
        }

        .remove-file {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: transparent;
            color: var(--muted);
            line-height: 18px;
            padding: 0;
        }

        .remove-file:hover {
            background: var(--surface-muted);
            color: var(--text);
        }

        .input-row {
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: end;
            gap: 10px;
            padding: 10px;
        }

        textarea {
            width: 100%;
            min-height: 56px;
            max-height: 180px;
            resize: vertical;
            border: 0;
            outline: 0;
            color: var(--text);
            line-height: 1.5;
        }

        textarea::placeholder {
            color: #9aa2a2;
        }

        .icon-button,
        .secondary,
        .primary {
            height: 36px;
            border-radius: 7px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            white-space: nowrap;
        }

        .icon-button {
            width: 36px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--muted);
        }

        .icon-button:hover {
            color: var(--text);
            background: var(--surface-muted);
        }

        .primary {
            min-width: 76px;
            background: var(--accent);
            color: #ffffff;
            padding: 0 14px;
            font-weight: 650;
        }

        .primary:hover {
            background: var(--accent-strong);
        }

        .primary:disabled {
            cursor: not-allowed;
            opacity: 0.62;
        }

        .secondary {
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--muted);
            padding: 0 10px;
            font-size: 12px;
        }

        .secondary:hover {
            color: var(--text);
            background: var(--surface-muted);
        }

        .controls {
            border-top: 1px solid var(--border);
            background: #fbfcfc;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            padding: 8px 10px;
        }

        .toggle {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            color: var(--muted);
            font-size: 12px;
        }

        .toggle input {
            accent-color: var(--accent);
        }

        .hidden-input {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }

        @media (max-width: 820px) {
            body { overflow: auto; }
            .app { min-height: 100vh; height: auto; }
            .topbar {
                flex-wrap: wrap;
                align-items: stretch;
            }
            .brand,
            .status {
                min-width: 0;
            }
            .field-url,
            .field-model {
                width: 100%;
                max-width: none;
                flex: 1 1 100%;
            }
            .main {
                min-height: calc(100vh - 160px);
                padding: 14px;
            }
            .input-row {
                grid-template-columns: auto 1fr;
            }
            .primary {
                grid-column: 1 / -1;
                width: 100%;
            }
            .controls {
                align-items: stretch;
                flex-direction: column;
            }
            .secondary {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <header class="topbar">
            <a class="brand" href="/dashboard">
                <svg class="brand-mark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 24" fill="none" stroke="#168575" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <line x1="2" y1="16" x2="30" y2="16"></line>
                    <path d="M4 16 Q16 4 28 16"></path>
                    <line x1="10" y1="16" x2="10" y2="11.2" stroke-opacity="0.5" stroke-width="1.5"></line>
                    <line x1="16" y1="16" x2="16" y2="7" stroke-opacity="0.5" stroke-width="1.5"></line>
                    <line x1="22" y1="16" x2="22" y2="11.2" stroke-opacity="0.5" stroke-width="1.5"></line>
                </svg>
                AgentBridge
            </a>
            <label class="field field-url">
                <span>Base URL</span>
                <input id="base-url" value="/api/v1" spellcheck="false">
            </label>
            <label class="field field-model">
                <span>Model</span>
                <select id="model">
                    <option value="claudecode/sonnet">claudecode/sonnet</option>
                    <option value="codex/gpt-5.5">codex/gpt-5.5</option>
                    <option value="openrouter/anthropic/claude-sonnet-4">openrouter/anthropic/claude-sonnet-4</option>
                </select>
            </label>
            <div id="status" class="status">Checking</div>
        </header>

        <main class="main">
            <section id="messages" class="messages" aria-live="polite">
                <div class="empty">
                    <strong>Send a test message</strong>
                    Use a model namespace, attach files if needed, and inspect any server error inline.
                </div>
            </section>

            <section id="composer" class="composer">
                <div class="drop-hint">Drop files to attach</div>
                <div id="attached-files" class="attached-files"></div>
                <div class="input-row">
                    <button id="attach-button" class="icon-button" title="Attach files" type="button" aria-label="Attach files">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M21.44 11.05 12.25 20.24a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
                        </svg>
                    </button>
                    <textarea id="prompt" placeholder="Send a test message..." rows="2"></textarea>
                    <button id="send" class="primary" type="button">Send</button>
                </div>
                <div class="controls">
                    <label class="toggle">
                        <input id="stream" type="checkbox" checked>
                        Stream
                    </label>
                    <button id="copy-curl" class="secondary" type="button">Copy cURL</button>
                </div>
                <input id="file-input" class="hidden-input" type="file" multiple accept="image/*,application/pdf">
            </section>
        </main>
    </div>

    <script>
        (function() {
            var baseUrlEl = document.getElementById("base-url");
            var modelEl = document.getElementById("model");
            var statusEl = document.getElementById("status");
            var messagesEl = document.getElementById("messages");
            var composerEl = document.getElementById("composer");
            var attachedFilesEl = document.getElementById("attached-files");
            var fileInputEl = document.getElementById("file-input");
            var attachButtonEl = document.getElementById("attach-button");
            var promptEl = document.getElementById("prompt");
            var streamEl = document.getElementById("stream");
            var sendEl = document.getElementById("send");
            var copyCurlEl = document.getElementById("copy-curl");
            var attachedFiles = [];
            var lastPayload = null;

            function endpoint(path) {
                return baseUrlEl.value.replace(/\/$/, "") + path;
            }

            function setStatus(kind, label) {
                statusEl.classList.remove("ok", "error");
                if (kind) statusEl.classList.add(kind);
                statusEl.textContent = label;
            }

            function clearEmptyState() {
                var empty = messagesEl.querySelector(".empty");
                if (empty) empty.remove();
            }

            function appendMessage(role, text, files) {
                clearEmptyState();
                var article = document.createElement("article");
                article.className = "message " + role;
                var header = document.createElement("div");
                header.className = "message-header";
                header.textContent = role === "user" ? "You" : "Assistant";
                var body = document.createElement("div");
                body.className = "message-body";
                body.textContent = text || "";
                article.appendChild(header);
                article.appendChild(body);

                if (files && files.length) {
                    var fileWrap = document.createElement("div");
                    fileWrap.className = "message-files";
                    files.forEach(function(file) {
                        fileWrap.appendChild(filePill(file.name, false));
                    });
                    article.appendChild(fileWrap);
                }

                messagesEl.appendChild(article);
                messagesEl.scrollTop = messagesEl.scrollHeight;
                return body;
            }

            function compactJson(value) {
                try {
                    return JSON.stringify(value, null, 2);
                } catch (e) {
                    return String(value);
                }
            }

            function summarizeError(status, statusText, body, requestId) {
                var err = body && body.error ? body.error : null;
                var title = "Server error";
                var summary = status + (statusText ? " " + statusText : "");
                if (err && err.message) summary = summary + ": " + err.message;
                return {
                    title: title,
                    summary: summary,
                    details: {
                        status: status,
                        statusText: statusText || null,
                        request_id: requestId || null,
                        error: err || body || null
                    }
                };
            }

            function appendError(status, statusText, body, requestId) {
                clearEmptyState();
                var info = summarizeError(status, statusText, body, requestId);
                var article = document.createElement("article");
                article.className = "message error";

                var title = document.createElement("div");
                title.className = "error-title";
                title.textContent = info.title;

                var summary = document.createElement("div");
                summary.className = "error-summary";
                summary.textContent = info.summary;

                var details = document.createElement("details");
                details.className = "error-details";
                details.open = true;
                var detailsSummary = document.createElement("summary");
                detailsSummary.textContent = "Details";
                var pre = document.createElement("pre");
                pre.textContent = compactJson(info.details);
                details.appendChild(detailsSummary);
                details.appendChild(pre);

                var actions = document.createElement("div");
                actions.className = "error-actions";

                var retry = document.createElement("button");
                retry.className = "secondary";
                retry.type = "button";
                retry.textContent = "Retry";
                retry.addEventListener("click", sendMessage);

                var copy = document.createElement("button");
                copy.className = "secondary";
                copy.type = "button";
                copy.textContent = "Copy details";
                copy.addEventListener("click", function() {
                    navigator.clipboard.writeText(compactJson(info.details));
                });

                actions.appendChild(retry);
                actions.appendChild(copy);

                article.appendChild(title);
                article.appendChild(summary);
                article.appendChild(details);
                article.appendChild(actions);
                messagesEl.appendChild(article);
                messagesEl.scrollTop = messagesEl.scrollHeight;
                setStatus("error", "Error");
            }

            function filePill(fileName, removable, index) {
                var pill = document.createElement("span");
                pill.className = "file-pill";

                var name = document.createElement("span");
                name.textContent = fileName;
                pill.appendChild(name);

                if (removable) {
                    var remove = document.createElement("button");
                    remove.className = "remove-file";
                    remove.type = "button";
                    remove.textContent = "x";
                    remove.title = "Remove file";
                    remove.addEventListener("click", function() {
                        attachedFiles.splice(index, 1);
                        renderAttachedFiles();
                    });
                    pill.appendChild(remove);
                }
                return pill;
            }

            function renderAttachedFiles() {
                attachedFilesEl.replaceChildren();
                attachedFiles.forEach(function(file, index) {
                    attachedFilesEl.appendChild(filePill(file.name, true, index));
                });
            }

            function addFiles(fileList) {
                Array.from(fileList).forEach(function(file) {
                    if (!file.type.startsWith("image/") && file.type !== "application/pdf") {
                        appendError(0, "Unsupported attachment", {
                            error: {
                                message: file.name + " is not an image or PDF.",
                                type: "invalid_attachment",
                                code: "unsupported_file_type"
                            }
                        }, null);
                        return;
                    }
                    attachedFiles.push(file);
                });
                renderAttachedFiles();
            }

            function fileToDataUrl(file) {
                return new Promise(function(resolve, reject) {
                    var reader = new FileReader();
                    reader.onload = function() { resolve(reader.result); };
                    reader.onerror = function() { reject(reader.error); };
                    reader.readAsDataURL(file);
                });
            }

            async function buildUserContent(text) {
                if (!attachedFiles.length) return text;
                var parts = [];
                if (text) parts.push({ type: "text", text: text });
                for (var i = 0; i < attachedFiles.length; i += 1) {
                    parts.push({
                        type: "image_url",
                        image_url: { url: await fileToDataUrl(attachedFiles[i]) }
                    });
                }
                return parts;
            }

            function displayTextFromContent(content) {
                if (typeof content === "string") return content;
                var textPart = content.find(function(part) { return part.type === "text"; });
                return textPart ? textPart.text : "";
            }

            async function parseResponseBody(response) {
                var text = await response.text();
                if (!text) return null;
                try {
                    return JSON.parse(text);
                } catch (e) {
                    return { raw: text };
                }
            }

            function responseText(data) {
                var choice = data && data.choices && data.choices[0];
                var msg = choice && choice.message;
                return (msg && msg.content) || "";
            }

            function parseSseEvent(buffer, onData) {
                var events = buffer.split(/\n\n/);
                var remainder = events.pop();
                events.forEach(function(event) {
                    var dataLines = event.split(/\n/).filter(function(line) {
                        return line.indexOf("data:") === 0;
                    }).map(function(line) {
                        return line.slice(5).trimStart();
                    });
                    if (dataLines.length) onData(dataLines.join("\n"));
                });
                return remainder;
            }

            async function streamResponse(response, target) {
                var reader = response.body.getReader();
                var decoder = new TextDecoder();
                var buffer = "";

                while (true) {
                    var read = await reader.read();
                    if (read.done) break;
                    buffer += decoder.decode(read.value, { stream: true });
                    buffer = parseSseEvent(buffer, function(data) {
                        if (data === "[DONE]") return;
                        try {
                            var chunk = JSON.parse(data);
                            var choice = chunk.choices && chunk.choices[0];
                            var delta = choice && choice.delta && choice.delta.content;
                            if (delta) {
                                target.textContent += delta;
                                messagesEl.scrollTop = messagesEl.scrollHeight;
                            }
                        } catch (e) {
                            target.textContent += data;
                        }
                    });
                }
            }

            async function sendMessage() {
                var text = promptEl.value.trim();
                if (!text && !attachedFiles.length) return;

                sendEl.disabled = true;
                setStatus(null, "Sending");

                try {
                    var content = await buildUserContent(text);
                    var filesForMessage = attachedFiles.slice();
                    var payload = {
                        model: modelEl.value,
                        messages: [{ role: "user", content: content }],
                        stream: streamEl.checked
                    };
                    lastPayload = payload;

                    appendMessage("user", displayTextFromContent(content), filesForMessage);
                    promptEl.value = "";
                    attachedFiles = [];
                    renderAttachedFiles();

                    var response = await fetch(endpoint("/chat/completions"), {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(payload)
                    });
                    var requestId = response.headers.get("x-request-id");

                    if (!response.ok) {
                        appendError(response.status, response.statusText, await parseResponseBody(response), requestId);
                        return;
                    }

                    setStatus("ok", "Healthy");
                    if (payload.stream) {
                        var target = appendMessage("assistant", "");
                        await streamResponse(response, target);
                    } else {
                        var data = await response.json();
                        appendMessage("assistant", responseText(data));
                    }
                } catch (error) {
                    appendError(0, "Request failed", {
                        error: {
                            message: error && error.message ? error.message : String(error),
                            type: "network_error",
                            code: "request_failed"
                        }
                    }, null);
                } finally {
                    sendEl.disabled = false;
                }
            }

            function sanitizePayloadForCurl(payload) {
                return JSON.parse(JSON.stringify(payload, function(key, value) {
                    if (key === "url" && typeof value === "string" && value.indexOf("data:") === 0) {
                        return "[data url omitted]";
                    }
                    return value;
                }));
            }

            function copyCurl() {
                var payload = lastPayload || {
                    model: modelEl.value,
                    messages: [{ role: "user", content: promptEl.value || "Hello!" }],
                    stream: streamEl.checked
                };
                var curl = [
                    "curl " + JSON.stringify(endpoint("/chat/completions")) + " \\",
                    "  -H \"Content-Type: application/json\" \\",
                    "  -d " + JSON.stringify(JSON.stringify(sanitizePayloadForCurl(payload), null, 2))
                ].join("\n");
                navigator.clipboard.writeText(curl);
            }

            async function loadModels() {
                try {
                    var response = await fetch(endpoint("/models"));
                    if (!response.ok) return;
                    var data = await response.json();
                    if (!data.data || !data.data.length) return;
                    modelEl.replaceChildren();
                    data.data.forEach(function(model) {
                        var option = document.createElement("option");
                        option.value = model.id;
                        option.textContent = model.id;
                        modelEl.appendChild(option);
                    });
                } catch (e) {
                    // Keep static fallback options.
                }
            }

            async function checkHealth() {
                try {
                    var response = await fetch("/health");
                    setStatus(response.ok ? "ok" : "error", response.ok ? "Healthy" : "Error");
                } catch (e) {
                    setStatus("error", "Offline");
                }
            }

            attachButtonEl.addEventListener("click", function() {
                fileInputEl.click();
            });
            fileInputEl.addEventListener("change", function() {
                addFiles(fileInputEl.files);
                fileInputEl.value = "";
            });
            sendEl.addEventListener("click", sendMessage);
            copyCurlEl.addEventListener("click", copyCurl);
            promptEl.addEventListener("keydown", function(e) {
                if ((e.metaKey || e.ctrlKey) && e.key === "Enter") sendMessage();
            });

            ["dragenter", "dragover"].forEach(function(eventName) {
                composerEl.addEventListener(eventName, function(e) {
                    e.preventDefault();
                    composerEl.classList.add("dragging");
                });
            });
            ["dragleave", "drop"].forEach(function(eventName) {
                composerEl.addEventListener(eventName, function(e) {
                    e.preventDefault();
                    if (eventName === "drop" && e.dataTransfer && e.dataTransfer.files) {
                        addFiles(e.dataTransfer.files);
                    }
                    composerEl.classList.remove("dragging");
                });
            });

            loadModels();
            checkHealth();
        })();
    </script>
</body>
</html>
