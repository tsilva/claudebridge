name: Release
on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish the current pyproject version if it is not already tagged
        required: false
        default: false
        type: boolean
  push:
    branches: [main]
    paths:
      - pyproject.toml
      - .github/workflows/release.yml
concurrency:
  group: release
  cancel-in-progress: false
jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      should-publish: ${{ steps.publish.outputs.should-publish }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Decide whether to publish
        id: publish
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should-publish=${{ inputs.publish }}" >> "$GITHUB_OUTPUT"
          elif git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" | grep -qx "pyproject.toml"; then
            echo "should-publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "should-publish=false" >> "$GITHUB_OUTPUT"
          fi

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --all-extras --python ${{ matrix.python-version }}
      - name: Run unit tests
        run: uv run --python ${{ matrix.python-version }} pytest tests/ -m unit -v --tb=short

  pii-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2

  publish:
    needs: [changes, test, pii-scan]
    if: needs.changes.outputs.should-publish == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: pypi
      url: https://pypi.org/project/agentbridge-py/
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check version
        id: check-version
        shell: bash
        run: |
          version="$(python - <<'PY'
          import tomllib

          with open("pyproject.toml", "rb") as pyproject_file:
              pyproject = tomllib.load(pyproject_file)

          print(pyproject["project"]["version"])
          PY
          )"
          tag="v${version}"

          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null || \
             git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            tag_exists=true
          else
            tag_exists=false
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "tag_exists=${tag_exists}" >> "$GITHUB_OUTPUT"
          echo "Version ${version} maps to ${tag}; tag_exists=${tag_exists}"
      - name: Setup uv
        if: steps.check-version.outputs.tag_exists == 'false'
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Build package
        if: steps.check-version.outputs.tag_exists == 'false'
        run: uv build
      - name: Verify PyPI project metadata
        if: steps.check-version.outputs.tag_exists == 'false'
        shell: bash
        run: |
          python - <<'PY'
          import email.parser
          import glob
          import tarfile
          import tomllib
          import zipfile

          expected_name = "agentbridge-py"
          names = set()

          for wheel in glob.glob("dist/*.whl"):
              with zipfile.ZipFile(wheel) as archive:
                  metadata_path = next(
                      name
                      for name in archive.namelist()
                      if name.endswith(".dist-info/METADATA")
                  )
                  metadata = archive.read(metadata_path).decode()
                  names.add(email.parser.Parser().parsestr(metadata)["Name"])

          for sdist in glob.glob("dist/*.tar.gz"):
              with tarfile.open(sdist, "r:gz") as archive:
                  pyproject_path = next(
                      member
                      for member in archive.getmembers()
                      if member.name.endswith("/pyproject.toml")
                  )
                  pyproject_file = archive.extractfile(pyproject_path)
                  if pyproject_file is None:
                      raise RuntimeError(f"Could not read {pyproject_path.name}")
                  pyproject = tomllib.loads(pyproject_file.read().decode())
                  names.add(pyproject["project"]["name"])

          if names != {expected_name}:
              raise RuntimeError(
                  f"Expected built project name {expected_name!r}, got {sorted(names)!r}"
              )

          print(f"Verified PyPI project name: {expected_name}")
          PY
      - name: Create GitHub release
        if: steps.check-version.outputs.tag_exists == 'false'
        run: gh release create "${{ steps.check-version.outputs.tag }}" --title "${{ steps.check-version.outputs.tag }}" --generate-notes dist/*
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish to PyPI
        if: steps.check-version.outputs.tag_exists == 'false'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
