name: Release
on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish the current pyproject version if it is not already tagged
        required: false
        default: false
        type: boolean
  push:
    branches: [main]
    paths:
      - pyproject.toml
      - .github/workflows/release.yml
concurrency:
  group: release
  cancel-in-progress: false
jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      should-publish: ${{ steps.publish.outputs.should-publish }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Decide whether to publish
        id: publish
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should-publish=${{ inputs.publish }}" >> "$GITHUB_OUTPUT"
          elif git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" | grep -qx "pyproject.toml"; then
            echo "should-publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "should-publish=false" >> "$GITHUB_OUTPUT"
          fi

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --all-extras --python ${{ matrix.python-version }}
      - name: Run unit tests
        run: uv run --python ${{ matrix.python-version }} pytest tests/ -m unit -v --tb=short

  pii-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2

  publish:
    needs: [changes, test, pii-scan]
    if: needs.changes.outputs.should-publish == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: pypi
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check version
        id: check-version
        uses: tsilva/.github/.github/actions/check-version@main
      - name: Setup uv
        if: steps.check-version.outputs.tag_exists == 'false'
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Build package
        if: steps.check-version.outputs.tag_exists == 'false'
        run: uv build
      - name: Create GitHub release
        if: steps.check-version.outputs.tag_exists == 'false'
        run: gh release create "${{ steps.check-version.outputs.tag }}" --title "${{ steps.check-version.outputs.tag }}" --generate-notes dist/*
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish to PyPI
        if: steps.check-version.outputs.tag_exists == 'false'
        uses: pypa/gh-action-pypi-publish@release/v1
